# appwrap iOS release — tag push (v*) → TestFlight via fastlane.
# Secrets contract (repo settings → Actions secrets):
#   MATCH_GIT_URL        private repo holding signing certs (fastlane match)
#   MATCH_PASSWORD       match encryption passphrase
#   ASC_KEY_ID           App Store Connect API key id
#   ASC_ISSUER_ID        App Store Connect issuer id
#   ASC_KEY_P8           App Store Connect .p8 key contents (base64)
# No interactive Apple ID — API-key auth only (headless-safe).
name: Release iOS
on:
  push:
    tags: ['v*']

jobs:
  testflight:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: bun install && bun run build.ts
      # Pin global tools — unpinned installs can grab a breaking release mid-flight. Bump deliberately.
      - run: npm i -g nativescript@9.0.6
      - run: bunx appwrap init # native/ is generated (gitignored) — regenerate it fresh in CI
      - working-directory: native
        run: npm install
      - uses: ruby/setup-ruby@v1
        with: { ruby-version: '3.3', bundler-cache: false }
      - run: gem install fastlane -v 2.236.1
      - name: Build & upload to TestFlight
        working-directory: native
        env:
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
        run: fastlane ios beta

  # Production promotion is a manual gate: re-run with the `production`
  # environment approved, or promote the TestFlight build in App Store Connect.
